name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # Speeds up runs by caching dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit pytenable

      - name: Lint with Flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat style issues as warnings (exit-zero) so it doesn't fail the build
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

      - name: Security Scan with Bandit
        run: |
          # Run Bandit to find common security issues in Python code
          # -r: recursive, -ll: medium severity and up, -ii: medium confidence and up
          bandit -r . -ll -ii -x .git,__pycache__
